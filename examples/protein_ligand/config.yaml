system_type: protein_ligand

inputs:
  complex: complex.pdb
  ligand: ligand.sdf

output_dir: outputs

prep:
  amber_level: low

fragit:
  central_fragment_resname: LIG   # 3-letter residue name of the ligand (required for 2layer mode)
  boundaries: 2.0
  basis: "6-31G*"
  calc_mode: "2layer"   # hf | mp2 | 2layer
  implicit_solvent: false
  nbody: 2
  resdim: 2.0
  rcorsd: 2.0
  mwords: 125
  ngroup: 1
