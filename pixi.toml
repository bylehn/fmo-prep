[workspace]
name = "fmo-prep"
version = "0.1.0"
description = "FMO preparation and analysis workflow"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11,<3.13"
rdkit = "*"
ambertools = "*"
openbabel = "*"
jinja2 = "*"
pydantic = ">=2"
click = "*"
matplotlib = "*"
seaborn = "*"
pandas = "*"
numpy = "*"
parmed = "*"
pyyaml = "*"
pytest = "*"
pytest-cov = "*"
hatchling = "*"

[pypi-dependencies]
fmo-prep = { path = ".", editable = true }
fragit = { git = "https://github.com/bylehn/fragit-main.git", rev = "3d3ba99" }

[tasks]
test = "pytest tests/ -v"

[activation]
env = { QT_QPA_PLATFORM = "xcb" }